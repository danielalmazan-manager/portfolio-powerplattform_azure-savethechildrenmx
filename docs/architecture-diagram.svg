<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D42027"/>
      <stop offset="100%" stop-color="#A0181D"/>
    </linearGradient>
    <linearGradient id="msGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#742774"/>
      <stop offset="100%" stop-color="#5B1F5B"/>
    </linearGradient>
    <linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
    <linearGradient id="paGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#004EC2"/>
    </linearGradient>
    <linearGradient id="biGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2C811"/>
      <stop offset="100%" stop-color="#D4AC0D"/>
    </linearGradient>
    <linearGradient id="extGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D8B4E"/>
      <stop offset="100%" stop-color="#1E6B3A"/>
    </linearGradient>
    <linearGradient id="secGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#888"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#F8F9FA" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="1100" height="58" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="30" width="1100" height="28" fill="url(#headerGrad)"/>
  <text x="550" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="700">System Architecture  &#8212;  Case Management Platform</text>

  <!-- LAYER 1: Presentation -->
  <rect x="40" y="78" width="1020" height="95" rx="10" fill="url(#msGrad)" filter="url(#shadow)"/>
  <text x="55" y="98" fill="white" font-size="10" font-weight="600" letter-spacing="1.5" opacity="0.7">PRESENTATION LAYER</text>
  <rect x="55" y="108" width="220" height="50" rx="8" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="165" y="131" text-anchor="middle" fill="white" font-size="15" font-weight="700">Power Apps</text>
  <text x="165" y="148" text-anchor="middle" fill="white" font-size="10" opacity="0.8">Canvas App (Low-Code UI)</text>
  <text x="300" y="128" fill="white" font-size="11" opacity="0.9">15+ Screens  |  Role-Based Navigation  |  Responsive Design (Web + Mobile)</text>
  <text x="300" y="148" fill="white" font-size="11" opacity="0.9">State Management via Collections, Context Variables, Global Variables</text>

  <path d="M550,173 L550,190" stroke="#888" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- LAYER 2: Orchestration -->
  <rect x="40" y="195" width="1020" height="95" rx="10" fill="url(#paGrad)" filter="url(#shadow)"/>
  <text x="55" y="215" fill="white" font-size="10" font-weight="600" letter-spacing="1.5" opacity="0.7">ORCHESTRATION LAYER</text>
  <rect x="55" y="225" width="220" height="50" rx="8" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="165" y="248" text-anchor="middle" fill="white" font-size="15" font-weight="700">Power Automate</text>
  <text x="165" y="265" text-anchor="middle" fill="white" font-size="10" opacity="0.8">8 Cloud Flows</text>
  <text x="300" y="245" fill="white" font-size="11" opacity="0.9">Document Lifecycle  |  PDF Encryption Pipeline  |  Email Dispatch</text>
  <text x="300" y="265" fill="white" font-size="11" opacity="0.9">QR Processing  |  BI Dataset Refresh  |  Async Execution (offloads UI)</text>

  <path d="M550,290 L550,307" stroke="#888" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- LAYER 3: Data -->
  <rect x="40" y="312" width="1020" height="95" rx="10" fill="url(#spGrad)" filter="url(#shadow)"/>
  <text x="55" y="332" fill="white" font-size="10" font-weight="600" letter-spacing="1.5" opacity="0.7">DATA LAYER</text>
  <rect x="55" y="342" width="260" height="50" rx="8" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="185" y="365" text-anchor="middle" fill="white" font-size="15" font-weight="700">SharePoint Online Lists</text>
  <text x="185" y="382" text-anchor="middle" fill="white" font-size="10" opacity="0.8">20+ Entities (Transactional Store)</text>
  <text x="340" y="362" fill="white" font-size="11" opacity="0.9">Fact Constellation Schema  |  Bridge Tables (M:N)  |  Document Libraries</text>
  <text x="340" y="382" fill="white" font-size="11" opacity="0.9">Indexed Columns (Delegation &gt;5K)  |  Azure AD Integrated Security</text>

  <path d="M550,407 L550,424" stroke="#888" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- LAYER 4: Analytics -->
  <rect x="40" y="429" width="1020" height="95" rx="10" fill="url(#biGrad)" filter="url(#shadow)"/>
  <text x="55" y="449" fill="#333" font-size="10" font-weight="600" letter-spacing="1.5" opacity="0.7">ANALYTICS LAYER</text>
  <rect x="55" y="459" width="220" height="50" rx="8" fill="#333" fill-opacity="0.12" stroke="#333" stroke-opacity="0.2" stroke-width="1"/>
  <text x="165" y="482" text-anchor="middle" fill="#333" font-size="15" font-weight="700">Power BI</text>
  <text x="165" y="499" text-anchor="middle" fill="#333" font-size="10" opacity="0.8">5 Interactive Dashboards</text>
  <text x="300" y="479" fill="#333" font-size="11" opacity="0.9">Advanced DAX: CROSSFILTER, USERELATIONSHIP  |  Embedded in Power Apps</text>
  <text x="300" y="499" fill="#333" font-size="11" opacity="0.9">Cross-Filter Global Panels  |  Corporate Theme (JSON)  |  Relational Model</text>

  <path d="M550,524 L550,541" stroke="#888" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- LAYER 5: External Services -->
  <rect x="40" y="546" width="1020" height="100" rx="10" fill="url(#extGrad)" filter="url(#shadow)"/>
  <text x="55" y="566" fill="white" font-size="10" font-weight="600" letter-spacing="1.5" opacity="0.7">EXTERNAL SERVICES LAYER</text>

  <rect x="55" y="578" width="210" height="52" rx="8" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="160" y="600" text-anchor="middle" fill="white" font-size="13" font-weight="700">Cloudmersive API</text>
  <text x="160" y="618" text-anchor="middle" fill="white" font-size="9" opacity="0.8">Primary PDF Encryption (REST)</text>

  <rect x="285" y="578" width="230" height="52" rx="8" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="400" y="600" text-anchor="middle" fill="white" font-size="13" font-weight="700">Flask API on Render</text>
  <text x="400" y="618" text-anchor="middle" fill="white" font-size="9" opacity="0.8">Python / PyPDF2 / Fallback Encryption</text>

  <rect x="535" y="578" width="220" height="52" rx="8" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="645" y="600" text-anchor="middle" fill="white" font-size="13" font-weight="700">GitHub Pages</text>
  <text x="645" y="618" text-anchor="middle" fill="white" font-size="9" opacity="0.8">QR Decoder (JavaScript)</text>

  <rect x="775" y="578" width="270" height="52" rx="8" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="910" y="600" text-anchor="middle" fill="white" font-size="13" font-weight="700">Outlook / Exchange Online</text>
  <text x="910" y="618" text-anchor="middle" fill="white" font-size="9" opacity="0.8">Encrypted Email Dispatch</text>

  <!-- LAYER 6: Security -->
  <rect x="40" y="660" width="1020" height="48" rx="10" fill="url(#secGrad)" filter="url(#shadow)"/>
  <text x="55" y="680" fill="white" font-size="10" font-weight="600" letter-spacing="1.5" opacity="0.7">IDENTITY AND SECURITY</text>
  <text x="260" y="694" fill="white" font-size="12" font-weight="600">Azure AD (Entra ID)</text>
  <text x="460" y="694" fill="white" font-size="12" opacity="0.5">|</text>
  <text x="500" y="694" fill="white" font-size="12" font-weight="600">Hashed User Identity</text>
  <text x="680" y="694" fill="white" font-size="12" opacity="0.5">|</text>
  <text x="720" y="694" fill="white" font-size="12" font-weight="600">RBAC (3 Roles)</text>
  <text x="870" y="694" fill="white" font-size="12" opacity="0.5">|</text>
  <text x="910" y="694" fill="white" font-size="12" font-weight="600">Data Obfuscation</text>

</svg>
