<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D42027"/>
      <stop offset="100%" stop-color="#A0181D"/>
    </linearGradient>
    <linearGradient id="msGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#742774"/>
      <stop offset="100%" stop-color="#5B1F5B"/>
    </linearGradient>
    <linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
    <linearGradient id="paGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#004EC2"/>
    </linearGradient>
    <linearGradient id="biGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2C811"/>
      <stop offset="100%" stop-color="#D4AC0D"/>
    </linearGradient>
    <linearGradient id="extGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D8B4E"/>
      <stop offset="100%" stop-color="#1E6B3A"/>
    </linearGradient>
    <linearGradient id="secGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#F8F9FA" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="1100" height="58" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="30" width="1100" height="28" fill="url(#headerGrad)"/>
  <text x="550" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="700">System Architecture — Case Management Platform</text>

  <!-- Layer 1: Presentation -->
  <rect x="40" y="78" width="1020" height="90" rx="10" fill="url(#msGrad)" filter="url(#shadow)"/>
  <text x="60" y="105" fill="white" font-size="11" font-weight="600" opacity="0.8">PRESENTATION LAYER</text>
  <rect x="60" y="115" width="250" height="40" rx="6" fill="white" fill-opacity="0.15"/>
  <text x="185" y="140" text-anchor="middle" fill="white" font-size="13" font-weight="600">⚡ Power Apps (Canvas)</text>
  <text x="330" y="135" fill="white" font-size="11" opacity="0.9">• 15+ Screens • Role-Based Navigation</text>
  <text x="330" y="152" fill="white" font-size="11" opacity="0.9">• Multi-Platform (Web + Mobile) • State Management • Corporate Branding</text>

  <!-- Arrow down -->
  <polygon points="550,168 540,178 545,178 545,188 555,188 555,178 560,178" fill="#666"/>

  <!-- Layer 2: Orchestration -->
  <rect x="40" y="192" width="1020" height="90" rx="10" fill="url(#paGrad)" filter="url(#shadow)"/>
  <text x="60" y="219" fill="white" font-size="11" font-weight="600" opacity="0.8">ORCHESTRATION LAYER</text>
  <rect x="60" y="229" width="250" height="40" rx="6" fill="white" fill-opacity="0.15"/>
  <text x="185" y="254" text-anchor="middle" fill="white" font-size="13" font-weight="600">⚙️ Power Automate</text>
  <text x="330" y="249" fill="white" font-size="11" opacity="0.9">• 8 Cloud Flows • Document Lifecycle • PDF Encryption Pipeline</text>
  <text x="330" y="266" fill="white" font-size="11" opacity="0.9">• Email Dispatch • QR Processing • BI Dataset Refresh • Async Execution</text>

  <!-- Arrow down -->
  <polygon points="550,282 540,292 545,292 545,302 555,302 555,292 560,292" fill="#666"/>

  <!-- Layer 3: Data -->
  <rect x="40" y="306" width="1020" height="90" rx="10" fill="url(#spGrad)" filter="url(#shadow)"/>
  <text x="60" y="333" fill="white" font-size="11" font-weight="600" opacity="0.8">DATA LAYER</text>
  <rect x="60" y="343" width="280" height="40" rx="6" fill="white" fill-opacity="0.15"/>
  <text x="200" y="368" text-anchor="middle" fill="white" font-size="13" font-weight="600">📊 SharePoint Online Lists</text>
  <text x="360" y="363" fill="white" font-size="11" opacity="0.9">• 20+ Entities • Fact Constellation Schema • Bridge Tables (M:N)</text>
  <text x="360" y="380" fill="white" font-size="11" opacity="0.9">• Document Libraries • Indexed Columns • Azure AD Integrated Security</text>

  <!-- Arrow down -->
  <polygon points="550,396 540,406 545,406 545,416 555,416 555,406 560,406" fill="#666"/>

  <!-- Layer 4: Analytics -->
  <rect x="40" y="420" width="1020" height="90" rx="10" fill="url(#biGrad)" filter="url(#shadow)"/>
  <text x="60" y="447" fill="#333" font-size="11" font-weight="600" opacity="0.8">ANALYTICS LAYER</text>
  <rect x="60" y="457" width="250" height="40" rx="6" fill="#333" fill-opacity="0.15"/>
  <text x="185" y="482" text-anchor="middle" fill="#333" font-size="13" font-weight="600">📈 Power BI</text>
  <text x="330" y="477" fill="#333" font-size="11" opacity="0.9">• 5 Interactive Dashboards • Advanced DAX (CROSSFILTER, USERELATIONSHIP)</text>
  <text x="330" y="494" fill="#333" font-size="11" opacity="0.9">• Embedded in Power Apps • Cross-Filter Global Panels • Corporate Themes</text>

  <!-- Arrow down -->
  <polygon points="550,510 540,520 545,520 545,530 555,530 555,520 560,520" fill="#666"/>

  <!-- Layer 5: External Services -->
  <rect x="40" y="534" width="1020" height="90" rx="10" fill="url(#extGrad)" filter="url(#shadow)"/>
  <text x="60" y="561" fill="white" font-size="11" font-weight="600" opacity="0.8">EXTERNAL SERVICES LAYER</text>

  <rect x="60" y="571" width="200" height="40" rx="6" fill="white" fill-opacity="0.15"/>
  <text x="160" y="596" text-anchor="middle" fill="white" font-size="12" font-weight="600">🔒 Cloudmersive API</text>

  <rect x="280" y="571" width="260" height="40" rx="6" fill="white" fill-opacity="0.15"/>
  <text x="410" y="591" text-anchor="middle" fill="white" font-size="12" font-weight="600">🐍 Flask API (Render)</text>
  <text x="410" y="605" text-anchor="middle" fill="white" font-size="9" opacity="0.8">Python / PyPDF2 / Fallback</text>

  <rect x="560" y="571" width="220" height="40" rx="6" fill="white" fill-opacity="0.15"/>
  <text x="670" y="596" text-anchor="middle" fill="white" font-size="12" font-weight="600">📱 GitHub Pages (QR)</text>

  <rect x="800" y="571" width="240" height="40" rx="6" fill="white" fill-opacity="0.15"/>
  <text x="920" y="596" text-anchor="middle" fill="white" font-size="12" font-weight="600">📧 Outlook / Exchange</text>

  <!-- Layer 6: Security -->
  <rect x="40" y="644" width="1020" height="56" rx="10" fill="url(#secGrad)" filter="url(#shadow)"/>
  <text x="60" y="669" fill="white" font-size="11" font-weight="600" opacity="0.8">IDENTITY & SECURITY</text>
  <text x="250" y="678" fill="white" font-size="12">🔐 Azure AD (Entra ID)</text>
  <text x="470" y="678" fill="white" font-size="12">│  Hashed User Identity</text>
  <text x="680" y="678" fill="white" font-size="12">│  RBAC (3 Roles)</text>
  <text x="850" y="678" fill="white" font-size="12">│  Data Obfuscation</text>

</svg>
